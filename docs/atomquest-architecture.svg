<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.42" stop-color="#0f2f3b"/>
      <stop offset="1" stop-color="#eef7f1"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#f1fbf6" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .title{font:800 44px Arial,Helvetica,sans-serif;fill:#fff;letter-spacing:0}
      .subtitle{font:400 20px Arial,Helvetica,sans-serif;fill:#dbeafe}
      .kicker{font:800 14px Arial,Helvetica,sans-serif;fill:#a7f3d0;letter-spacing:3px}
      .section{font:800 22px Arial,Helvetica,sans-serif;fill:#0f172a}
      .smallTitle{font:800 17px Arial,Helvetica,sans-serif;fill:#0f172a}
      .body{font:400 15px Arial,Helvetica,sans-serif;fill:#334155}
      .tiny{font:700 12px Arial,Helvetica,sans-serif;fill:#475569;letter-spacing:.8px}
      .whiteTitle{font:800 18px Arial,Helvetica,sans-serif;fill:#fff}
      .whiteBody{font:400 14px Arial,Helvetica,sans-serif;fill:#e0f2fe}
      .pillText{font:800 13px Arial,Helvetica,sans-serif;fill:#064e3b}
      .flowText{font:800 13px Arial,Helvetica,sans-serif;fill:#1d4ed8}
      .card{fill:url(#softPanel);stroke:#d7e2ea;stroke-width:1.4;filter:url(#smallShadow)}
      .darkCard{fill:#0f2434;stroke:#2dd4bf;stroke-opacity:.35;stroke-width:1.2;filter:url(#smallShadow)}
      .line{stroke:#0f766e;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .mutedLine{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="145" cy="100" r="210" fill="#14b8a6" opacity="0.16"/>
  <circle cx="1620" cy="1040" r="280" fill="#2563eb" opacity="0.13"/>
  <circle cx="1560" cy="150" r="170" fill="#f59e0b" opacity="0.10"/>

  <text x="70" y="72" class="kicker">ATOMQUEST 1.0</text>
  <text x="70" y="126" class="title">Goal Setting &amp; Tracking Portal - Production Architecture</text>
  <text x="70" y="161" class="subtitle">Hosted Next.js portal with real auth, Microsoft Entra SSO, Graph hierarchy sync, Neon persistence, analytics, escalations, CSV export, and notifications.</text>
  <rect x="1395" y="58" width="335" height="82" rx="14" fill="#ffffff" opacity="0.94"/>
  <text x="1420" y="92" class="smallTitle">Deliverables</text>
  <text x="1420" y="119" class="body">Live URL + GitHub repo + demo credentials</text>

  <!-- Users -->
  <rect x="60" y="220" width="265" height="325" rx="18" class="card"/>
  <text x="86" y="258" class="section">Browser Users</text>
  <rect x="86" y="285" width="210" height="56" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="108" y="309" class="smallTitle">Employee</text>
  <text x="108" y="330" class="body">goals, submit, actuals</text>
  <rect x="86" y="360" width="210" height="56" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="108" y="384" class="smallTitle">Manager (L1)</text>
  <text x="108" y="405" class="body">approve, return, check-ins</text>
  <rect x="86" y="435" width="210" height="56" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="108" y="459" class="smallTitle">Admin / HR</text>
  <text x="108" y="480" class="body">cycles, hierarchy, reports</text>
  <text x="86" y="512" class="tiny">Portal login or Microsoft SSO</text>
  <text x="86" y="532" class="tiny">HTTP-only signed session cookie</text>

  <!-- Frontend -->
  <rect x="390" y="210" width="355" height="350" rx="20" class="card"/>
  <text x="420" y="248" class="section">Next.js Web App on Vercel</text>
  <text x="420" y="281" class="body">React 19 UI + Tailwind CSS styling</text>
  <text x="420" y="308" class="body">Role-based dashboard navigation</text>
  <text x="420" y="335" class="body">Responsive desktop-first demo experience</text>
  <rect x="420" y="365" width="285" height="44" rx="10" fill="url(#blueGreen)"/>
  <text x="445" y="393" class="whiteTitle">Portal Auth + Microsoft SSO</text>
  <rect x="420" y="428" width="285" height="82" rx="12" fill="#f8fafc" stroke="#dbe4ea"/>
  <text x="443" y="456" class="smallTitle">Client State Sync</text>
  <text x="443" y="480" class="body">Debounced save to API</text>
  <text x="443" y="502" class="body">Refresh button reloads live DB state</text>
  <text x="443" y="532" class="body">SSO success routes to role dashboard</text>

  <!-- API -->
  <rect x="805" y="210" width="365" height="350" rx="20" class="darkCard"/>
  <text x="835" y="248" class="whiteTitle">Server / API Layer</text>
  <text x="835" y="281" class="whiteBody">/api/auth signup, login, logout, session</text>
  <text x="835" y="308" class="whiteBody">/api/auth/sso login, callback, status</text>
  <text x="835" y="335" class="whiteBody">/api/state scoped by current user role</text>
  <text x="835" y="362" class="whiteBody">/api/cron/reminders uses locked rules</text>
  <rect x="835" y="392" width="305" height="126" rx="12" fill="#12364a" stroke="#2dd4bf" stroke-opacity=".35"/>
  <text x="858" y="421" class="whiteTitle">Business Rules Enforced</text>
  <text x="858" y="448" class="whiteBody">100% total weightage</text>
  <text x="858" y="472" class="whiteBody">minimum 10% per goal, maximum 8 goals</text>
  <text x="858" y="496" class="whiteBody">phase locks, approval locks, admin unlock</text>
  <text x="858" y="520" class="whiteBody">auto-escalation employee -> manager -> HR</text>

  <!-- Data -->
  <rect x="1235" y="210" width="500" height="350" rx="20" class="card"/>
  <text x="1265" y="248" class="section">Neon PostgreSQL + Prisma</text>
  <text x="1265" y="281" class="body">Normalized production tables with Prisma Client</text>
  <text x="1265" y="309" class="body">Users, Cycle, Goals, SharedGoals, Updates</text>
  <text x="1265" y="337" class="body">CheckIns, AuditLogs, EscalationLogs, SSO sync audit</text>
  <rect x="1265" y="368" width="210" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1287" y="401" class="smallTitle">Password hashes</text>
  <rect x="1490" y="368" width="210" height="54" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="1512" y="401" class="smallTitle">Azure role hierarchy</text>
  <rect x="1265" y="440" width="435" height="72" rx="12" fill="#f8fafc" stroke="#dbe4ea"/>
  <text x="1288" y="468" class="smallTitle">Persistence Guarantees</text>
  <text x="1288" y="492" class="body">Submits, edits, approvals, updates, check-ins,</text>
  <text x="1288" y="515" class="body">Entra role, manager sync, audit entries persist.</text>

  <path d="M325 380 C350 380, 360 380, 390 380" class="line"/>
  <path d="M745 380 C770 380, 780 380, 805 380" class="line"/>
  <path d="M1170 380 C1200 380, 1210 380, 1235 380" class="line"/>

  <!-- Microsoft identity integration -->
  <rect x="458" y="532" width="330" height="74" rx="18" fill="#ffffff" opacity="0.95" filter="url(#smallShadow)"/>
  <text x="485" y="559" class="smallTitle">Microsoft Entra ID + Graph</text>
  <text x="485" y="581" class="body">OAuth SSO, /me profile, /me/manager</text>
  <text x="485" y="600" class="body">Group membership maps Admin / Manager / Employee</text>
  <path d="M610 532 C650 505, 720 480, 805 440" class="line"/>
  <path d="M788 572 C940 595, 1110 585, 1235 520" class="line"/>

  <!-- Workflow swimlane -->
  <rect x="60" y="625" width="1675" height="225" rx="22" fill="#ffffff" opacity="0.95" filter="url(#shadow)"/>
  <text x="90" y="664" class="section">End-to-End Workflow Pipeline</text>

  <g>
    <rect x="90" y="695" width="205" height="105" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="112" y="724" class="smallTitle">1. Employee Goals</text>
    <text x="112" y="750" class="body">thrust area, title, UoM</text>
    <text x="112" y="773" class="body">target + weightage</text>
  </g>
  <g>
    <rect x="330" y="695" width="205" height="105" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="352" y="724" class="smallTitle">2. Validation</text>
    <text x="352" y="750" class="body">100% total</text>
    <text x="352" y="773" class="body">10% min, max 8 goals</text>
  </g>
  <g>
    <rect x="570" y="695" width="205" height="105" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="592" y="724" class="smallTitle">3. L1 Approval</text>
    <text x="592" y="750" class="body">inline target edits</text>
    <text x="592" y="773" class="body">approve or return</text>
  </g>
  <g>
    <rect x="810" y="695" width="205" height="105" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="832" y="724" class="smallTitle">4. Locking</text>
    <text x="832" y="750" class="body">approved read-only</text>
    <text x="832" y="773" class="body">admin unlock exception</text>
  </g>
  <g>
    <rect x="1050" y="695" width="205" height="105" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="1072" y="724" class="smallTitle">5. Q1-Q4 Updates</text>
    <text x="1072" y="750" class="body">actual achievement</text>
    <text x="1072" y="773" class="body">status + progress score</text>
  </g>
  <g>
    <rect x="1290" y="695" width="205" height="105" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <text x="1312" y="724" class="smallTitle">6. Check-ins</text>
    <text x="1312" y="750" class="body">planned vs actual</text>
    <text x="1312" y="773" class="body">structured manager note</text>
  </g>
  <g>
    <rect x="1530" y="695" width="175" height="105" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1552" y="724" class="smallTitle">7. Governance</text>
    <text x="1552" y="750" class="body">audit logs</text>
    <text x="1552" y="773" class="body">CSV reports</text>
  </g>
  <path d="M295 747 L330 747" class="mutedLine"/>
  <path d="M535 747 L570 747" class="mutedLine"/>
  <path d="M775 747 L810 747" class="mutedLine"/>
  <path d="M1015 747 L1050 747" class="mutedLine"/>
  <path d="M1255 747 L1290 747" class="mutedLine"/>
  <path d="M1495 747 L1530 747" class="mutedLine"/>

  <!-- Feature matrix -->
  <rect x="60" y="895" width="535" height="230" rx="20" class="card"/>
  <text x="90" y="933" class="section">Must-Have BRD Coverage</text>
  <text x="90" y="970" class="body">Goal creation, UoM, target, weightage, submit state</text>
  <text x="90" y="997" class="body">Manager review, inline edit, approve, return-for-rework</text>
  <text x="90" y="1024" class="body">Approved goal locking and Admin / HR unlock intervention</text>
  <text x="90" y="1051" class="body">Shared departmental KPI pushed to selected employees</text>
  <text x="90" y="1078" class="body">Primary owner achievement sync across linked shared goals</text>
  <text x="90" y="1105" class="body">Quarterly planned vs actual tracking and manager check-ins</text>

  <rect x="635" y="895" width="535" height="230" rx="20" class="card"/>
  <text x="665" y="933" class="section">Admin, Reports &amp; Analytics</text>
  <text x="665" y="970" class="body">Cycle phase control: Goal Setting, Q1, Q2, Q3, Q4 / Annual</text>
  <text x="665" y="997" class="body">Hierarchy management and employee-manager assignment</text>
  <text x="665" y="1024" class="body">Achievement report with CSV download</text>
  <text x="665" y="1051" class="body">Completion dashboard and real-time governance overview</text>
  <text x="665" y="1078" class="body">QoQ trends, heatmaps / progress charts, distribution analysis</text>
  <text x="665" y="1105" class="body">Manager effectiveness dashboard by L1 check-in completion</text>

  <rect x="1210" y="895" width="525" height="230" rx="20" class="card"/>
  <text x="1240" y="933" class="section">Bonus Modules &amp; Integrations</text>
  <text x="1240" y="965" class="body">Microsoft Entra SSO via OAuth authorization code flow</text>
  <text x="1240" y="990" class="body">Graph manager sync derives employee reporting lines</text>
  <text x="1240" y="1015" class="body">Azure group membership maps Admin / Manager / Employee</text>
  <text x="1240" y="1040" class="body">Locked escalation rules auto-run employee -> manager -> HR</text>
  <text x="1240" y="1065" class="body">Resend workflow and escalation emails with deep links</text>
  <text x="1240" y="1090" class="body">Optional Teams webhook adaptive-card pipeline</text>
  <text x="1240" y="1115" class="body">Cost-aware hosting: Vercel + Neon serverless free-tier friendly</text>

  <!-- Integrations -->
  <rect x="1240" y="585" width="225" height="56" rx="28" fill="#ffffff" opacity="0.94"/>
  <text x="1270" y="620" class="pillText">Resend Email</text>
  <path d="M1120 560 C1165 592, 1195 608, 1240 612" class="line"/>
  <rect x="1490" y="585" width="225" height="56" rx="28" fill="#ffffff" opacity="0.94"/>
  <text x="1517" y="620" class="pillText">Teams Webhook Ready</text>
  <path d="M1138 548 C1258 560, 1358 586, 1490 612" class="line"/>

  <text x="70" y="1162" class="subtitle">Live: atomquest-portal.vercel.app | Source: github.com/aditya-1408/atomquest-portal | Stack: Next.js + Tailwind + Prisma + Neon + Vercel + Resend + Microsoft Entra ID</text>
</svg>
